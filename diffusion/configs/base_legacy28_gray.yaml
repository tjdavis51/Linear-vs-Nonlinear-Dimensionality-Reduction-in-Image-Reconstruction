    - diffusion_backbone
    - diffusion_preprocessing
    - image_size
    - diffusion_channels
    - timesteps
    - base_channels
    - time_dim
    - schedule
    - beta_start
    - beta_end
    - ema_decay
    - num_res_blocks
    - prediction_type
    - class_dropout_prob
    - guidance_scale
    - sampler
    - sampling_steps
    - ddim_eta
    - grad_clip_norm
    - amp_dtype
    - sample_count
    - eval_num_generated_samples
    - eval_cfg_comparison_scales
  allowed_overrides:
    - config_name
    - dataset
    - dataset_variant
    - epochs
    - batch_size
    - num_workers
    - eval_batch_size
    - data_dir
